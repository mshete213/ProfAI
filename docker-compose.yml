services:
  postgres:
    image: postgres:16-alpine
    container_name: edtech-postgres
    environment:
      POSTGRES_USER: edtech
      POSTGRES_PASSWORD: edtech_dev
      POSTGRES_DB: edtech
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edtech -d edtech"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: edtech-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edtech-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://edtech:edtech_dev@postgres:5432/edtech
      REDIS_URL: redis://redis:6379/0
      BACKEND_INTERNAL_URL: http://backend:8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploaded_files:/app/uploads
      - watch_folder:/watched
    command: >
      sh -c "alembic upgrade head &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edtech-worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://edtech:edtech_dev@postgres:5432/edtech
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploaded_files:/app/uploads
      - watch_folder:/watched
    command: celery -A core.celery_app worker --beat --loglevel=info --concurrency=4

  mcp_server:
    build:
      context: ./mcp_server
      dockerfile: Dockerfile
    container_name: edtech-mcp
    env_file:
      - .env
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./mcp_server:/app
      - watch_folder:/watched
    command: python server.py

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edtech-frontend
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000

volumes:
  postgres_data:
  redis_data:
  uploaded_files:
  watch_folder:
  frontend_node_modules:
